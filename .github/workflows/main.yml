name: Daily Script
on:
  schedule:
    - cron: '0 8 * * *'  # 9:00 AM London Summer Time
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Run script
        env:
          my_email: ${{ secrets.my_email }}
          my_password: ${{ secrets.my_password }}
        run: python main.py
